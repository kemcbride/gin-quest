{{ define "newgameform" }}
<h1>New Game</h1>
<form action="/newgame" method="POST">
	<div>
		<label for="name">Name:</label>
		<input type="text" id="name" name="name" required>
	</div>
	<div>
		<label for="level">Level:</label>
		<input type="number" id="level" name="level" required>
	</div>
	<div>
		<button type="submit">Go!</button>
	</div>
</form>
{{ end }}
